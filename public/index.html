<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05060d" />

  <title>MEDLAB AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="ai.css" />
</head>

<body>

<div class="ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid"></div>
  <div class="noise"></div>
  <div class="vignette"></div>
</div>

<div id="toast-root" class="toast-root"></div>

<header class="page-header">
  <nav class="ai-nav">

    <a href="#" class="brand">
      <span class="brand-mark">
        <img src="medlab-logo.png" width="22" />
      </span>

      <span class="brand-text">
        MEDLAB <span class="brand-accent">AI</span>
      </span>
    </a>

    <div class="nav-meta">
      <span class="status-pill">
        <span class="status-dot"></span>
        <span>Online</span>
      </span>
    </div>

  </nav>
</header>

<main class="page-main">

  <section class="hero-strip">
    <p class="eyebrow">
      <span class="eyebrow-dot"></span>
      <span>Clinical-grade reasoning · Beta</span>
    </p>

    <h1 class="hero-title">
      Ask anything <em>medical.</em>
    </h1>

    <p class="hero-sub">
      A thoughtful companion for symptoms, conditions, medications, and study.
    </p>
  </section>

  <div class="chat-container">

    <div id="chat-box">

      <div class="welcome" id="welcome-state">

        <div class="welcome-badge">
          <span class="welcome-pulse"></span>
          <span>MEDLAB AI is ready</span>
        </div>

        <h2 class="welcome-title">
          Hello 👋
          <br />
          How can I help today?
        </h2>

        <p class="welcome-sub">
          Try one of the suggestions below.
        </p>

        <div class="suggestions">

          <button class="chip" data-prompt="What are the early warning signs of a stroke?">
            <span>Early warning signs of a stroke</span>
          </button>

          <button class="chip" data-prompt="Explain Type 1 vs Type 2 diabetes.">
            <span>Type 1 vs Type 2 diabetes</span>
          </button>

          <button class="chip" data-prompt="What does elevated CRP mean?">
            <span>What does elevated CRP mean?</span>
          </button>

          <button class="chip" data-prompt="Common ibuprofen interactions.">
            <span>Ibuprofen interactions</span>
          </button>

        </div>

      </div>

    </div>

    <button id="scroll-fab" class="scroll-fab" hidden>
      ↓
    </button>

    <form class="input-box" id="input-form">

      <div class="input-shell">

        <textarea
          id="user-input"
          rows="1"
          placeholder="Ask MEDLAB AI anything..."
        ></textarea>

      </div>

      <button id="send-btn" class="send-btn">

        <span class="send-btn-bg"></span>

        <span class="send-btn-label">
          Send
        </span>

      </button>

    </form>

  </div>

</main>

<script src="ai.js"></script>

</body>
</html>
