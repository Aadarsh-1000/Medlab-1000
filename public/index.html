<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDLAB AI | Next Gen Assistant</title>
  
  <!-- Fonts: Plus Jakarta Sans for a modern tech feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons: Phosphor Icons (Lightweight & Clean) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    /* ===== VARIABLES & RESET ===== */
    :root {
      /* Palette: Deep Future Medical */
      --bg-body: #05080d;
      --bg-gradient: radial-gradient(circle at 50% 0%, #0f1c2e 0%, #05080d 60%);
      
      --glass-bg: rgba(20, 25, 35, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.03);

      --primary: #00e0ff; /* Cyan Neon */
      --primary-glow: rgba(0, 224, 255, 0.4);
      --secondary: #2a3b55;
      
      --text-main: #eef2f6;
      --text-muted: #94a3b8;
      
      --msg-user-bg: linear-gradient(135deg, #00bcd4 0%, #006064 100%);
      --msg-bot-bg: rgba(30, 41, 59, 0.6);

      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 20px rgba(0, 224, 255, 0.15);

      --radius-outer: 24px;
      --radius-inner: 18px;
      
      --font-main: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      outline: none;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-main);
      background: var(--bg-body);
      background-image: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* Prevent body scroll, handle in chat */
      position: relative;
    }

    /* ===== AMBIENT BACKGROUND FX ===== */
    .ambient-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 224, 255, 0.08) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: -1;
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
      50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
    }

    /* ===== MAIN CONTAINER (GLASS) ===== */
    .app-container {
      width: 100%;
      max-width: 950px;
      height: 90vh;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-top: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-outer);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .chat-header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(20, 25, 35, 0.4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), #008ba3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 20px;
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .brand-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .brand-text span {
      font-size: 0.8rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 6px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
      animation: pulse-green 2s infinite;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    /* Custom Scrollbar */
    .chat-area::-webkit-scrollbar {
      width: 6px;
    }
    .chat-area::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .chat-area::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* ===== MESSAGES ===== */
    .message-row {
      display: flex;
      gap: 16px;
      max-width: 85%;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .message-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .avatar.bot {
      background: rgba(255, 255, 255, 0.1);
      color: var(--primary);
      border: 1px solid var(--glass-border);
    }

    .avatar.user {
      background: var(--text-muted);
      color: #1a1a1a;
      font-size: 16px;
    }

    .bubble {
      padding: 16px 22px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.6;
      position: relative;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .bot .bubble {
      background: var(--msg-bot-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
    }

    .user .bubble {
      background: var(--msg-user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(0, 188, 212, 0.25);
    }

    /* Code / Data Block Styling inside messages */
    .bubble code {
      font-family: 'Courier New', monospace;
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    /* ===== INPUT AREA ===== */
    .input-wrapper {
      padding: 20px 30px 30px;
      background: linear-gradient(to top, rgba(20, 25, 35, 0.9) 0%, transparent 100%);
    }

    .input-container {
      position: relative;
      background: rgba(10, 15, 20, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 6px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }

    .input-container:focus-within {
      border-color: rgba(0, 224, 255, 0.4);
      box-shadow: 0 0 20px rgba(0, 224, 255, 0.1), inset 0 2px 10px rgba(0,0,0,0.2);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-family: var(--font-main);
      font-size: 1rem;
      padding: 16px 20px;
      resize: none;
      max-height: 120px;
      min-height: 56px;
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: none;
      background: var(--primary);
      color: #002e36;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-bottom: 2px;
      margin-right: 2px;
    }

    .send-btn:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: wave 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    /* ===== ANIMATIONS ===== */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-green {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    @keyframes wave {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {
      body {
        align-items: flex-start;
        overflow: auto; /* Allow scroll on body */
        background: #05080d; /* Solid background on mobile */
      }
      
      .app-container {
        height: 100vh;
        max-width: 100%;
        border-radius: 0;
        border: none;
        border-bottom: 1px solid var(--glass-border);
      }

      .chat-area {
        padding: 20px 16px;
      }

      .message-row {
        max-width: 95%;
      }

      .input-wrapper {
        padding: 16px;
      }
      
      .ambient-glow {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Ambient Background Effect -->
  <div class="ambient-glow"></div>

  <main class="app-container">
    
    <!-- HEADER -->
    <header class="chat-header">
      <div class="brand">
        <div class="logo-icon">
          <i class="ph ph-dna"></i>
        </div>
        <div class="brand-text">
          <h1>MEDLAB AI</h1>
          <span>Medical Assistant</span>
        </div>
      </div>

      <div class="status-indicator">
        <div class="status-dot"></div>
        Online
      </div>
    </header>

    <!-- CHAT HISTORY -->
    <div id="chat-box" class="chat-area">
      
      <!-- Initial Welcome Message -->
      <div class="message-row bot">
        <div class="avatar bot">
          <i class="ph ph-robot"></i>
        </div>
        <div class="bubble">
          Hello. I am MedLab AI. I can assist you with analyzing medical queries, terminology, and general health protocols.<br><br>
          How may I help you today?
        </div>
      </div>

    </div>

    <!-- INPUT AREA -->
    <div class="input-wrapper">
      <div class="input-container">
        <textarea 
          id="user-input" 
          rows="1" 
          placeholder="Type your medical question..."
        ></textarea>
        <button id="send-btn" class="send-btn" aria-label="Send Message">
          <i class="ph ph-paper-plane-right-fill"></i>
        </button>
      </div>
    </div>

  </main>

  <script>
    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // Auto-resize textarea
    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      if(this.value === '') this.style.height = 'auto';
    });

    // Scroll to bottom utility
    function scrollToBottom() {
      chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: 'smooth'
      });
    }

    // Create Message HTML
    function appendMessage(text, sender) {
      const row = document.createElement('div');
      row.classList.add('message-row', sender);
      
      const avatar = document.createElement('div');
      avatar.classList.add('avatar', sender);
      
      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      
      // Add Icons
      if (sender === 'bot') {
        avatar.innerHTML = '<i class="ph ph-robot"></i>';
      } else {
        avatar.innerHTML = '<i class="ph ph-user"></i>';
      }
      
      // Handle basic HTML in response (bolding, line breaks)
      bubble.innerHTML = text.replace(/\n/g, '<br>');
      
      row.appendChild(avatar);
      row.appendChild(bubble);
      chatBox.appendChild(row);
      scrollToBottom();
    }

    // Show Loading Indicator
    function showLoading() {
      const row = document.createElement('div');
      row.classList.add('message-row', 'bot');
      row.id = 'loading-indicator';
      
      row.innerHTML = `
        <div class="avatar bot"><i class="ph ph-robot"></i></div>
        <div class="bubble">
          <div class="typing-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      `;
      
      chatBox.appendChild(row);
      scrollToBottom();
    }

    function removeLoading() {
      const loader = document.getElementById('loading-indicator');
      if (loader) loader.remove();
    }

    // Main Send Logic
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;

      // 1. Add User Message
      appendMessage(text, 'user');
      userInput.value = '';
      userInput.style.height = 'auto';
      
      // Disable Input
      userInput.disabled = true;
      sendBtn.disabled = true;

      // 2. Show Loading
      showLoading();

      // 3. Simulate API Delay & Response
      // NOTE: In your real app, uncomment the fetch logic below.
      // For this demo, we simulate a response so you can see the UI.
      
      try {
        /* 
        // --- REAL API CODE ---
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: text })
        });
        
        const data = await response.json();
        const reply = data.response?.trim() || "No data received.";
        */

        // --- DEMO SIMULATION (Remove this block in production) ---
        await new Promise(r => setTimeout(r, 1500)); // Fake network delay
        const reply = "I've analyzed your query regarding \"" + text + "\". Based on current medical protocols, it is recommended to consult a specialist for a precise diagnosis. I can provide more detailed statistics if needed.";
        // ---------------------------------------------------------

        removeLoading();
        appendMessage(reply, 'bot');

      } catch (error) {
        removeLoading();
        appendMessage("I apologize, but I'm having trouble connecting to the server right now.", 'bot');
        console.error(error);
      } finally {
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // Event Listeners
    sendBtn.addEventListener('click', handleSend);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    // Focus input on load
    userInput.focus();

  </script>
</body>
</html>
