<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDLAB AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body id="vantajs">
    <nav>
    <div class="logo">
        MEDLAB
        <div class="hero">AI</div>
    </div>

    <div class="navbtn">

        <a href="https://www.medlabai.in/">
            <div class="button-1">
                Get Diagnosis →
            </div>
        </a>

        <a href="/api/auth/login" id="login-link">
            <div class="button-1">
                Login with Google
            </div>
        </a>

    </div>
</nav>
    <hr>
      
    <h1>Your <text>intelligent</text> medical companion</h1>
    
    <div class="sub-text">Ask Medlab-AI any medical question to get precise and accurate answers.</div>
    <a href="ai.html"><button id="startBtn">Start a conversation</button></a>
    <style>
        body{
           background-color: #0a0a0b;
           align-items: center;
           text-align: center;
           justify-content: center  ;
              min-height: 100vh;
              overflow: hidden;
    overflow-x: hidden;
           
        }
        a{
            text-decoration: none;
        }
        .navbtn{
            display: flex;
            gap: 12px;
            position: fixed;
            right: 20px;
        }
     .button-1{
    font-family: "poppins";
    color: beige;
    border: 2px solid white;
    padding: 10px 16px;
    border-radius: 10px;
    position: relative;
    white-space: nowrap;
}
        body{
   
   .logo,
   h1,
   .sub-text,
   button,
   hr{
      position: relative;
      z-index: 1;
   }
}
        nav{
            display: flex;
            backdrop-filter: blur(20px);
            background-color: transparent;
            
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    backdrop-filter: blur(20px);
    background-color: transparent;

            
        }
        body::before{
    content: "";

    position: fixed;

    inset: 0;

    background:
    radial-gradient(
        circle at center,
        rgba(10,10,11,0.2),
        rgba(10,10,11,0.75)
    );

    z-index: 0;

    pointer-events: none;
}
         .button-1:hover{
            background-color: #6b6a72;
         }
       
        h1{
    font-size: 50px;
    flex-wrap: wrap;
    margin-top: 10%;
    max-width: 30%;
    font-weight: 300;
    justify-self: center;
    color: aliceblue;
    line-height: 1.25;
letter-spacing: -1px;
    text-align: center;
    font-family: "DM Serif Display";

    transition: 
    transform 0.3s ease-in,
    color 0.3s ease-in,
    text-shadow 0.3s ease-in;
}
hr{
   border: none;
    height: 0.5px;
    background: rgba(255,255,255,0.08);
   

}
.hero{
    font-family: "DM Serif Display";
    color: #c8b8ff;
    font-size: 20px;
    padding-left: 4px;
    width: 50px;
}

.logo{
    display: flex;
    padding-left: 10px;
    display: flex;
    padding-right: 10px;
    font-size: 19px;
    min-width: max-content;
    padding: 10px;
      font-family: "DM Serif Display";
    text-align: left;
    color: rgb(227, 227, 227);
}
h1:hover{
    transform: translateY(-5px) scale(1.02);

    color: white;

    text-shadow:
    0 0 10px rgba(255,255,255,0.3),
    0 0 30px rgba(124,58,237,0.5);
}
        
        text{
            color: #c8b8ff;
            font-style: italic;
        }
        .sub-text{
            color: #6b6a72;
            justify-self: center;
            font-family: "poppins";
        }
        button{
            margin-top: 5%;
            padding: 10px 12px;
            color: white;
            border-radius: 10px;
            border: 2px solid #6b6a72;
            background-color: #0a0a0b;
            font-family: "poppins";
            justify-self: center;
        }
        button:hover{
            background: #6b6a72;
            transition-duration: 200ms;
        }
    </style>
   <script>

VANTA.NET({
    el: "#vantajs",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200,
    minWidth: 200,
    scale: 1,
    scaleMobile: 1,
    color: 0xc8b8ff,
    backgroundColor: 0x0a0a0b,
    points: 8,
    maxDistance: 18,
    spacing: 20
});

async function checkLogin() {

    try {

        const res =
            await fetch("/api/auth/me");

        const user =
            await res.json();

        console.log(user);

        const btn =
            document.getElementById("startBtn");

        const navBtns =
            document.querySelector(".navbtn");

        // USER LOGGED IN
        if (user && user.email) {

            btn.innerText =
                `Continue as ${user.name}`;

            btn.onclick = () => {
                window.location.href =
                    "/ai.html";
            };

            // REPLACE LOGIN BUTTON
            navBtns.innerHTML = `
                <a href="https://www.medlabai.in/">
                    <div class="button-1">
                        Get Diagnosis →
                    </div>
                </a>

                <a href="/api/auth/logout">
                    <div class="button-1">
                        Logout
                    </div>
                </a>
            `;

        } else {

            // USER NOT LOGGED IN
            btn.onclick = () => {
                window.location.href =
                    "/api/auth/login";
            };
        }

    } catch (err) {

        console.error(err);
    }
}

checkLogin();

</script>
    
</body>
</html>
