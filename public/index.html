<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MEDLAB AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web">

<style>

:root{
  --bg:#1b1c1d;
  --sidebar:#171717;
  --chat:#212121;
  --border:#2c2c2c;
  --text:#f5f5f5;
  --muted:#9ca3af;
  --user:#343541;
  --bot:#262626;
  --accent:#d97757;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* APP */

.app{
  display:flex;
  height:100vh;
  width:100%;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  padding:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:30px;
}

.logo-icon{
  width:42px;
  height:42px;
  border-radius:12px;
  background:linear-gradient(135deg,#ff9b71,#d97757);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:white;
}

.logo h1{
  font-size:16px;
  font-weight:700;
}

.logo span{
  font-size:12px;
  color:var(--muted);
}

.new-chat{
  background:#2b2b2b;
  border:1px solid var(--border);
  color:white;
  padding:14px;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  gap:10px;
  transition:.2s;
}

.new-chat:hover{
  background:#323232;
}

/* MAIN */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */

.topbar{
  height:65px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 30px;
  background:rgba(0,0,0,.15);
  backdrop-filter:blur(10px);
}

.topbar-title{
  font-weight:600;
  font-size:15px;
}

/* CHAT */

.chat-area{
  flex:1;
  overflow-y:auto;
  padding:40px 0 160px;
}

.chat-wrapper{
  width:100%;
  max-width:900px;
  margin:auto;
  padding:0 24px;
}

/* MESSAGES */

.message{
  display:flex;
  gap:18px;
  margin-bottom:32px;
  animation:fadeUp .25s ease;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:10px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.avatar.bot{
  background:#2d2d2d;
  color:#ff9b71;
}

.avatar.user{
  background:#3b3b3b;
}

.bubble{
  line-height:1.75;
  font-size:15px;
  color:#ececec;
  padding-top:4px;
  white-space:pre-wrap;
}

.user .bubble{
  color:white;
}

/* INPUT */

.input-area{
  position:fixed;
  bottom:0;
  left:260px;
  right:0;
  padding:24px;
  background:linear-gradient(to top,#1b1c1d 70%,transparent);
}

.input-wrapper{
  max-width:900px;
  margin:auto;
}

.input-box{
  background:#2a2a2a;
  border:1px solid #3a3a3a;
  border-radius:24px;
  display:flex;
  align-items:flex-end;
  padding:10px;
  transition:.2s;
}

.input-box:focus-within{
  border-color:#555;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  background:transparent;
  color:white;
  font-family:inherit;
  font-size:15px;
  padding:14px;
  max-height:200px;
  outline:none;
}

textarea::placeholder{
  color:#8f8f8f;
}

.send-btn{
  width:46px;
  height:46px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  font-size:18px;
  flex-shrink:0;
  transition:.2s;
}

.send-btn:hover{
  transform:scale(1.05);
}

.send-btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* TYPING */

.typing{
  display:flex;
  gap:5px;
  padding-top:10px;
}

.typing span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#888;
  animation:bounce 1.4s infinite ease-in-out;
}

.typing span:nth-child(2){
  animation-delay:.2s;
}

.typing span:nth-child(3){
  animation-delay:.4s;
}

/* ANIMATIONS */

@keyframes bounce{
  0%,80%,100%{
    transform:scale(.7);
    opacity:.5;
  }
  40%{
    transform:scale(1);
    opacity:1;
  }
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* MOBILE */

@media(max-width:768px){

  .sidebar{
    display:none;
  }

  .input-area{
    left:0;
  }

  .chat-wrapper{
    padding:0 18px;
  }

  .topbar{
    padding:0 18px;
  }

}

</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      <div class="logo-icon">
        <i class="ph ph-brain"></i>
      </div>

      <div>
        <h1>MEDLAB AI</h1>
        <span>Medical Assistant</span>
      </div>
    </div>

    <button class="new-chat">
      <i class="ph ph-plus"></i>
      New Chat
    </button>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <header class="topbar">
      <div class="topbar-title">
        MEDLAB AI
      </div>
    </header>

    <!-- CHAT -->

    <div id="chat-box" class="chat-area">

      <div class="chat-wrapper">

        <div class="message bot">

          <div class="avatar bot">
            <i class="ph ph-sparkle"></i>
          </div>

          <div class="bubble">
Hello 👋

I'm MEDLAB AI.
Ask me any medical question.
          </div>

        </div>

      </div>

    </div>

  </main>

</div>

<!-- INPUT -->

<div class="input-area">

  <div class="input-wrapper">

    <div class="input-box">

      <textarea
        id="user-input"
        rows="1"
        placeholder="Message MEDLAB AI..."
      ></textarea>

      <button id="send-btn" class="send-btn">
        <i class="ph ph-arrow-up"></i>
      </button>

    </div>

  </div>

</div>

<script>

const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");

/* AUTO RESIZE */

userInput.addEventListener("input", function(){

  this.style.height = "auto";
  this.style.height = this.scrollHeight + "px";

});

/* SCROLL */

function scrollBottom(){

  chatBox.scrollTo({
    top:chatBox.scrollHeight,
    behavior:"smooth"
  });

}

/* ADD MESSAGE */

function addMessage(text,sender){

  const wrapper = document.querySelector(".chat-wrapper");

  const msg = document.createElement("div");

  msg.className = `message ${sender}`;

  msg.innerHTML = `

    <div class="avatar ${sender}">
      <i class="ph ${
        sender === "bot"
        ? "ph-sparkle"
        : "ph-user"
      }"></i>
    </div>

    <div class="bubble">
      ${text.replace(/\n/g,"<br>")}
    </div>

  `;

  wrapper.appendChild(msg);

  scrollBottom();

}

/* LOADING */

function showLoading(){

  const wrapper = document.querySelector(".chat-wrapper");

  const loading = document.createElement("div");

  loading.className = "message bot";

  loading.id = "loading";

  loading.innerHTML = `

    <div class="avatar bot">
      <i class="ph ph-sparkle"></i>
    </div>

    <div class="bubble">

      <div class="typing">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

  `;

  wrapper.appendChild(loading);

  scrollBottom();

}

function removeLoading(){

  const loading = document.getElementById("loading");

  if(loading) loading.remove();

}

/* SEND */

async function sendMessage(){

  const text = userInput.value.trim();

  if(!text) return;

  addMessage(text,"user");

  userInput.value = "";
  userInput.style.height = "auto";

  userInput.disabled = true;
  sendBtn.disabled = true;

  showLoading();

  try{

    const response = await fetch("/api/generate",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        prompt:text
      })

    });

    let data = {};

    try{
      data = await response.json();
    }catch{
      throw new Error("Invalid server response");
    }

    removeLoading();

    if(!response.ok){

      throw new Error(
        data.message || "Server Error"
      );

    }

    const reply =
      data.response?.trim() ||
      "No response received.";

    addMessage(reply,"bot");

  }catch(error){

    removeLoading();

    addMessage(
      "⚠️ " + error.message,
      "bot"
    );

    console.error(error);

  }finally{

    userInput.disabled = false;
    sendBtn.disabled = false;

    userInput.focus();

    scrollBottom();

  }

}

/* EVENTS */

sendBtn.addEventListener(
  "click",
  sendMessage
);

userInput.addEventListener(
  "keydown",
  (e)=>{

    if(
      e.key === "Enter" &&
      !e.shiftKey
    ){

      e.preventDefault();

      sendMessage();

    }

  }
);

</script>



 </body>
</html>
