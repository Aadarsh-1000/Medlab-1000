<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>MEDLAB AI</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="ai.css" />
</head>

<body>

  <header class="page-header">
    <nav class="ai-nav">
      <h1>MEDLAB AI</h1>
    </nav>
  </header>

  <main class="page-main">

    <div class="chat-container">

      <!-- CHAT -->

      <div id="chat-box">

        <div class="message bot">
          Hello 👋 <br>
          Ask me any medical question.
        </div>

      </div>

      <!-- INPUT -->

      <div class="messageBox">

        <!-- FILE BUTTON -->

        <div class="fileUploadWrapper">

          <label for="file">

            <svg viewBox="0 0 337 337" fill="none">

              <circle
                cx="168.5"
                cy="168.5"
                r="158.5"
                stroke="#6c6c6c"
                stroke-width="20"
              />

              <path
                d="M167.759 79V259"
                stroke="#6c6c6c"
                stroke-width="25"
                stroke-linecap="round"
              />

              <path
                d="M79 167.138H259"
                stroke="#6c6c6c"
                stroke-width="25"
                stroke-linecap="round"
              />

            </svg>

            <span class="tooltip">
              Attach file
            </span>

          </label>

          <input type="file" id="file" />

        </div>

        <!-- INPUT -->

        <input
          required
          placeholder="Ask a medical question..."
          type="text"
          id="messageInput"
          autocomplete="off"
        />

        <!-- SEND BUTTON -->

        <button id="sendButton">

          <svg
            viewBox="0 0 664 663"
            fill="none"
          >

            <path
              d="M646.999 331.5L314.999 663L266.669 614.67L516.839 364.5H17V298.5H516.839L266.669 48.33L314.999 0L646.999 331.5Z"
              fill="none"
            />

          </svg>

        </button>

      </div>

    </div>

  </main>

  <script>

    const input = document.getElementById("messageInput");
    const chatBox = document.getElementById("chat-box");
    const sendButton = document.getElementById("sendButton");

    function scrollToBottom() {
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderMarkdown(markdown) {
      const lines = escapeHtml(markdown).split(/\r?\n/);
      const html = [];
      let inList = false;

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (!line) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          continue;
        }

        if (line.startsWith("### ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h4>${line.slice(4)}</h4>`);
          continue;
        }

        if (line.startsWith("## ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h3>${line.slice(3)}</h3>`);
          continue;
        }

        if (line.startsWith("# ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h2>${line.slice(2)}</h2>`);
          continue;
        }

        if (/^[-*]\s+/.test(line)) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push(`<li>${line.replace(/^[-*]\s+/, "")}</li>`);
          continue;
        }

        if (inList) {
          html.push("</ul>");
          inList = false;
        }

        html.push(`<p>${line}</p>`);
      }

      if (inList) {
        html.push("</ul>");
      }

      return html
        .join("")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(
          /\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
        );
    }

    function createMessage(text, sender, useMarkdown = false) {

      const message = document.createElement("div");

      message.className = `message ${sender}`;

      if (useMarkdown) {
        message.innerHTML = renderMarkdown(text);
      } else {
        message.textContent = text;
      }

      chatBox.appendChild(message);

      scrollToBottom();
    }

    function parseServerEvents(buffer, onEvent) {
      const events = buffer.split("\n\n");
      const remaining = events.pop() || "";

      for (const rawEvent of events) {
        let eventName = "message";
        const dataLines = [];

        for (const line of rawEvent.split("\n")) {
          if (line.startsWith("event:")) {
            eventName = line.slice(6).trim();
          }

          if (line.startsWith("data:")) {
            dataLines.push(line.slice(5).trim());
          }
        }

        if (dataLines.length > 0) {
          onEvent(eventName, JSON.parse(dataLines.join("\n")));
        }
      }

      return remaining;
    }

    async function sendMessage() {

      const userText = input.value.trim();

      if (!userText) return;

      createMessage(userText, "user");

      input.value = "";

      input.disabled = true;
      sendButton.disabled = true;

      const loadingDiv = document.createElement("div");

      loadingDiv.className = "message bot progress-message";

      loadingDiv.textContent = "User query received";

      chatBox.appendChild(loadingDiv);

      scrollToBottom();

      try {

        const response = await fetch("/api/generate", {

          method: "POST",

          headers: {
            "Content-Type": "application/json",
            "Accept": "text/event-stream"
          },

          body: JSON.stringify({
            prompt: userText
          })

        });

        if (!response.ok) {
          throw new Error("Server error occurred");
        }

        if (!response.body) {
          throw new Error("Streaming is not supported in this browser");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let finalData = null;

        while (true) {
          const { value, done } = await reader.read();

          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          buffer = parseServerEvents(buffer, (eventName, data) => {
            if (eventName === "progress") {
              loadingDiv.textContent = data.text;
              scrollToBottom();
            }

            if (eventName === "final") {
              finalData = data;
            }

            if (eventName === "error") {
              throw new Error(data.message || "Server error occurred");
            }
          });
        }

        if (!finalData) {
          throw new Error("No response received.");
        }

        const botReply =
          finalData.response?.trim() ||
          "No response received.";

        loadingDiv.innerHTML = renderMarkdown(botReply);
        loadingDiv.classList.remove("progress-message");

      } catch (error) {

        loadingDiv.remove();

        createMessage(
          "Error: " + error.message,
          "bot"
        );

        console.error(error);

      } finally {

        input.disabled = false;
        sendButton.disabled = false;

        input.focus();

        scrollToBottom();
      }
    }

    // BUTTON CLICK

    sendButton.addEventListener("click", sendMessage);

    // ENTER KEY

    input.addEventListener("keydown", (e) => {

      if (e.key === "Enter") {
        sendMessage();
      }

    });

  </script>

</body>
</html>
